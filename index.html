<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intangible Store</title>
    <!-- Tailwind CSS 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 구글 폰트 (픽셀 폰트) 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 네오둥근모 (한글 픽셀 폰트) 로드 */
        @font-face {
            font-family: 'NeoDunggeunmo';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3/NeoDunggeunmo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #ffffff; 
            font-family: sans-serif;
            font-family: 'Noto Sans Mono SemiCondensed', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .font-pixel {
            font-family: 'Silkscreen', 'NeoDunggeunmo', cursive;
        }
        /* 배경 질감 효과 */
        .grain-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            mix-blend-mode: multiply;
            z-index: 0;
        }
        
        /* 3D 영수증 뒤집기 효과를 위한 커스텀 클래스 */
        .perspective { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .flipped .flip-card-inner { transform: rotateY(180deg); }

        /* 영수증 상하 지그재그 효과 */
        .receipt-zigzag {
            -webkit-mask: 
                conic-gradient(from -45deg at bottom, transparent, #000 1deg 89deg, transparent 90deg) 0 100% / 12px 6px repeat-x,
                conic-gradient(from 135deg at top, transparent, #000 1deg 89deg, transparent 90deg) 0 0 / 12px 6px repeat-x,
                linear-gradient(#000 0 0) 0 6px / 100% calc(100% - 12px) no-repeat;
            mask: 
                conic-gradient(from -45deg at bottom, transparent, #000 1deg 89deg, transparent 90deg) 0 100% / 12px 6px repeat-x,
                conic-gradient(from 135deg at top, transparent, #000 1deg 89deg, transparent 90deg) 0 0 / 12px 6px repeat-x,
                linear-gradient(#000 0 0) 0 6px / 100% calc(100% - 12px) no-repeat;
        }

        /* 동그란 사진 부분만 마스킹 (글자 완벽 보호) */
        .circle-mask {
            -webkit-mask-image: radial-gradient(circle closest-side at 50% 50%, black 92%, transparent 100%);
            mask-image: radial-gradient(circle closest-side at 50% 50%, black 92%, transparent 100%);
        }

        /* 컨테이너의 마우스 위치 변수 */
        .distort-container {
            --mouse-x: 50%;
            --mouse-y: 50%;
        }

        /* 돋보기(볼록 렌즈) 래퍼 - 마우스 주변만 보이게 마스킹 */
        .lens-wrapper {
            opacity: 0;
            -webkit-mask-image: radial-gradient(circle 120px at var(--mouse-x) var(--mouse-y), black 60%, transparent 100%);
            mask-image: radial-gradient(circle 120px at var(--mouse-x) var(--mouse-y), black 60%, transparent 100%);
            transition: opacity 0.2s ease-out;
        }
        .distort-container:hover .lens-wrapper {
            opacity: 1;
        }

        /* 실제 확대되는 렌즈 이미지 - 마우스 중심에서 확대 */
        .lens-image {
            transform-origin: var(--mouse-x) var(--mouse-y);
            transform: scale(1.35); /* 볼록하게 커지는 비율 */
        }
    </style>
</head>

                </div>
                <div class="backface-hidden absolute inset-0 receipt-zigzag bg-[#fdf2f3] p-2 rotate-y-180">
                    <div class="relative w-full h-full bg-white receipt-zigzag distort-container overflow-hidden pointer-events-auto">
                        <img src="hi/ab.jpeg" alt="Receipt Back Base" draggable="false" class="absolute inset-0 w-full h-full object-cover pointer-events-none">
                        <div class="absolute inset-0 w-full h-full pointer-events-none circle-mask">
                            <div class="w-full h-full pointer-events-none lens-wrapper">
                                <img src="hi/ab.jpeg" alt="Receipt Back Lens" draggable="false" class="absolute inset-0 w-full h-full object-cover lens-image">
                            </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 계절별 하트(기억 목록) 카운트 변수
        const memoryCounts = {
            spring: 0,
            summer: 0,
            autumn: 0,
            winter: 0
        };

        // 스토어 화면 초기화 함수 (하트 카운터 유지)
        function resetStore() {
            // 1. 드래그된 영수증 위치 초기화 및 뒤집힌 카드 원상복구
            const receipts = document.querySelectorAll('.draggable-wrapper');
            receipts.forEach(receipt => {
                receipt.style.left = '0px';
                receipt.style.top = '0px';
                const card = receipt.querySelector('.perspective');
                if (card && card.classList.contains('flipped')) {
                    card.classList.remove('flipped');
                }
            });
            
            // 2. 계절 필터도 'All' 기본 상태로 리셋
            const allBtn = document.querySelector('.filter-btn');
            if (allBtn) filterSeason('all', allBtn);
        }

        // 계절 필터링 함수
        function filterSeason(season, btnElement) {
            // 모든 필터 버튼 스타일 초기화
            const allBtns = document.querySelectorAll('.filter-btn');
            allBtns.forEach(btn => {
                btn.classList.remove('bg-black', 'text-white', 'shadow-lg');
                btn.classList.add('text-gray-400', 'hover:text-black');
            });
            
            // 클릭된 버튼 스타일 활성화
            btnElement.classList.remove('text-gray-400', 'hover:text-black');
            btnElement.classList.add('bg-black', 'text-white', 'shadow-lg');

            // 영수증 블러 처리 및 클릭 차단 제어
            const receipts = document.querySelectorAll('.draggable-wrapper');
            receipts.forEach(receipt => {
                if (season === 'all' || receipt.dataset.season === season) {
                    receipt.classList.remove('blur-sm', 'opacity-50', 'pointer-events-none');
                } else {
                    receipt.classList.add('blur-sm', 'opacity-50', 'pointer-events-none');
                } 
            });
        }

        // 기억 목록에 추가 (하트 버튼 클릭) 및 이미지 토글
        function addMemory(event, bgColor, btn, originalSrc, filledSrc) {
            event.stopPropagation(); // 카드 뒤집기 방지
            
            const container = btn.parentElement;
            const img = container.querySelector('img');
            let toastText = '기억 목록에 추가!';

            // 현재 영수증의 계절 파악
            const wrapper = btn.closest('.draggable-wrapper');
            const season = wrapper ? wrapper.dataset.season : null;
            
            // 현재 이미지가 원본이면 채워진 이미지로 변경, 아니면 원본으로 되돌림
            if (img.getAttribute('src') === originalSrc) {
                img.setAttribute('src', filledSrc);
                // 횟수 제한 없이 누르는 족족 카운트 증가
                if (season) memoryCounts[season]++;
            } else {
                img.setAttribute('src', originalSrc);
                toastText = '기억 목록에서 삭제!'; // 취소했을 때의 멘트
            }

            const existingToast = document.querySelector('.memory-toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            
            // 테두리 제거, 그림자 추가(shadow-2xl), 화면 정중앙 고정 배치
            toast.className = 'memory-toast fixed top-1/2 left-1/2 w-[280px] md:w-[320px] receipt-zigzag font-pixel text-black text-sm lg:text-base font-bold text-center py-5 shadow-2xl transform -translate-x-1/2 -translate-y-1/2 scale-95 opacity-0 transition-all duration-300 z-[100] pointer-events-none';
            toast.style.backgroundColor = bgColor;
            toast.innerText = toastText;
            
            // 카운터 화면 업데이트
            if (season) {
                document.getElementById(`count-${season}`).innerText = `+${memoryCounts[season]}`;
            }

            document.body.appendChild(toast);
            
            // 화면에 렌더링된 후 부드럽게 나타나는 애니메이션
            requestAnimationFrame(() => {
                toast.classList.remove('scale-95', 'opacity-0');
                toast.classList.add('scale-100');
            });
            
            // 2초 후 스르륵 사라지기
            setTimeout(() => {
                toast.classList.add('scale-95', 'opacity-0');
                toast.classList.remove('scale-100');
                setTimeout(() => {
                    if (document.body.contains(toast)) {
                        toast.remove();
                    }
                }, 300); // 애니메이션 끝난 후 요소 완전 제거
            }, 2000);
        }

        // 드래그 앤 드롭 및 클릭(뒤집기) 기능 제어
        document.addEventListener('DOMContentLoaded', () => {
            const wrappers = document.querySelectorAll('.draggable-wrapper');
            let highestZIndex = 20; // 드래그할 때 가장 위로 올라오도록 설정

            // 커서 움직임에 따른 볼록렌즈 효과 제어
            const distortContainers = document.querySelectorAll('.distort-container');
            distortContainers.forEach(container => {
                const moveDistortion = (e) => {
                    let clientX, clientY;
                    if (e.type === 'touchmove') {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }
                    const rect = container.getBoundingClientRect();
                    const x = ((clientX - rect.left) / rect.width) * 100;
                    const y = ((clientY - rect.top) / rect.height) * 100;
                    
                    container.style.setProperty('--mouse-x', `${x}%`);
                    container.style.setProperty('--mouse-y', `${y}%`);
                };
                container.addEventListener('mousemove', moveDistortion);
                container.addEventListener('touchmove', moveDistortion, { passive: true });
            });

            wrappers.forEach(wrapper => {
                let isDragging = false;
                let startX, startY, initialLeft, initialTop;
                let moved = false;

                // 마우스 및 터치 이벤트 연결
                wrapper.addEventListener('mousedown', dragStart);
                wrapper.addEventListener('touchstart', dragStart, { passive: false });

                function dragStart(e) {
                    if (e.type === 'mousedown') {
                        startX = e.clientX;
                        startY = e.clientY;
                    } else {
                        startX = e.touches[0].clientX;
                        startY = e.touches[0].clientY;
                    }

                    const style = window.getComputedStyle(wrapper);
                    initialLeft = parseInt(style.left, 10) || 0;
                    initialTop = parseInt(style.top, 10) || 0;
                    
                    isDragging = true;
                    moved = false; // 방금 누른 시점에는 아직 움직이지 않음

                    highestZIndex++;
                    wrapper.style.zIndex = highestZIndex;

                    document.addEventListener('mousemove', drag);
                    document.addEventListener('mouseup', dragEnd);
                    document.addEventListener('touchmove', drag, { passive: false });
                    document.addEventListener('touchend', dragEnd);
                }

                function drag(e) {
                    if (!isDragging) return;
                    
                    let currentX, currentY;
                    if (e.type === 'mousemove') {
                        currentX = e.clientX;
                        currentY = e.clientY;
                    } else {
                        currentX = e.touches[0].clientX;
                        currentY = e.touches[0].clientY;
                    }

                    const dx = currentX - startX;
                    const dy = currentY - startY;

                    // 아주 미세한 떨림은 클릭으로 간주하기 위해 임계값(3px)을 설정
                    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                        moved = true;
                    }

                    if (moved) {
                        e.preventDefault(); // 드래그 중 텍스트 선택이나 화면 스크롤 방지
                        wrapper.style.left = (initialLeft + dx) + 'px';
                        wrapper.style.top = (initialTop + dy) + 'px';
                    }
                }

                function dragEnd(e) {
                    isDragging = false;
                    document.removeEventListener('mousemove', drag);
                    document.removeEventListener('mouseup', dragEnd);
                    document.removeEventListener('touchmove', drag);
                    document.removeEventListener('touchend', dragEnd);
                }

                // 카드를 마우스로 움직이지 않고 제자리에서 '클릭'만 했을 때 뒤집기 수행
                wrapper.addEventListener('click', function(e) {
                    if (!moved) {
                        const card = wrapper.querySelector('.perspective');
                        if(card) {
                            card.classList.toggle('flipped');
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>

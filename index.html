<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intangible Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        '3xl': '1920px',
                        '4xl': '2400px', 
                        '5xl': '3200px',
                        '6xl': '5000px', 
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&amp;display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'NeoDunggeunmo';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3/NeoDunggeunmo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #ffffff; 
            font-family: sans-serif;
            font-family: 'Noto Sans Mono SemiCondensed', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .font-pixel {
            font-family: 'Silkscreen', 'NeoDunggeunmo', cursive;
        }
        .grain-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            mix-blend-mode: multiply;
            z-index: 0;
        }
        
        .perspective { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .flipped .flip-card-inner { transform: rotateY(180deg); }

        :root {
            --zz-size-w: 12px;
            --zz-size-h: 6px;
            --zz-size-h2: 12px;
            --zz-large-w: 36px;
            --zz-large-h: 18px;
            --zz-large-h2: 36px;
            --lens-size: 140px;
        }
        @media (min-width: 2400px) {
            :root {
                --zz-size-w: 32px;
                --zz-size-h: 16px;
                --zz-size-h2: 32px;
                --zz-large-w: 50px;
                --zz-large-h: 25px;
                --zz-large-h2: 50px;
                --lens-size: 320px;
            }
        }
        @media (min-width: 4000px) {
            :root {
                --zz-size-w: 64px;
                --zz-size-h: 32px;
                --zz-size-h2: 64px;
                --zz-large-w: 90px;
                --zz-large-h: 45px;
                --zz-large-h2: 90px;
                --lens-size: 480px;
            }
        }

        .receipt-zigzag {
            -webkit-mask: 
                conic-gradient(from -45deg at bottom, #000 0 90deg, transparent 0) 50% 100% / var(--zz-size-w) var(--zz-size-h) repeat-x,
                conic-gradient(from 135deg at top, #000 0 90deg, transparent 0) 50% 0 / var(--zz-size-w) var(--zz-size-h) repeat-x,
                linear-gradient(#000 0 0) 50% 50% / 100% calc(100% - var(--zz-size-h2) + 2px) no-repeat;
            mask: 
                conic-gradient(from -45deg at bottom, #000 0 90deg, transparent 0) 50% 100% / var(--zz-size-w) var(--zz-size-h) repeat-x,
                conic-gradient(from 135deg at top, #000 0 90deg, transparent 0) 50% 0 / var(--zz-size-w) var(--zz-size-h) repeat-x,
                linear-gradient(#000 0 0) 50% 50% / 100% calc(100% - var(--zz-size-h2) + 2px) no-repeat;
        }

        .receipt-zigzag-large {
            -webkit-mask: 
                conic-gradient(from -45deg at bottom, #000 0 90deg, transparent 0) 50% 100% / var(--zz-large-w) var(--zz-large-h) repeat-x,
                conic-gradient(from 135deg at top, #000 0 90deg, transparent 0) 50% 0 / var(--zz-large-w) var(--zz-large-h) repeat-x,
                linear-gradient(#000 0 0) 50% 50% / 100% calc(100% - var(--zz-large-h2) + 2px) no-repeat;
            mask: 
                conic-gradient(from -45deg at bottom, #000 0 90deg, transparent 0) 50% 100% / var(--zz-large-w) var(--zz-large-h) repeat-x,
                conic-gradient(from 135deg at top, #000 0 90deg, transparent 0) 50% 0 / var(--zz-large-w) var(--zz-large-h) repeat-x,
                linear-gradient(#000 0 0) 50% 50% / 100% calc(100% - var(--zz-large-h2) + 2px) no-repeat;
        }

        /* 브라우저 그림자 렌더링 버그 차단: 제안해주신 대로 틈새를 완전히 배경색으로 채웁니다! */
        .perspective.drop-shadow-md {
            filter: none !important;
        }
        .perspective .backface-hidden {
            filter: drop-shadow(0 4px 3px rgba(0,0,0,0.07)) drop-shadow(0 2px 2px rgba(0,0,0,0.06));
        }

        .circle-mask {
            -webkit-mask-image: radial-gradient(circle closest-side at 50% 50%, black 92%, transparent 100%);
            mask-image: radial-gradient(circle closest-side at 50% 50%, black 92%, transparent 100%);
        }

        .distort-container {
            --mouse-x: 50%;
            --mouse-y: 50%;
        }

        .lens-wrapper {
            opacity: 0;
            -webkit-mask-image: radial-gradient(circle var(--lens-size) at var(--mouse-x) var(--mouse-y), black 60%, transparent 100%);
            mask-image: radial-gradient(circle var(--lens-size) at var(--mouse-x) var(--mouse-y), black 60%, transparent 100%);
            transition: opacity 0.2s ease-out;
        }
        .distort-container:hover .lens-wrapper {
            opacity: 1;
        }

        .lens-image {
            transform-origin: var(--mouse-x) var(--mouse-y);
            transform: scale(1.35);
        }
    </style>
</head>
<body>

    <div class="grain-bg">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <filter id="noise">
                <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
            </filter>
            <rect width="100%" height="100%" filter="url(#noise)" />
        </svg>
    </div>

    <header id="mainHeader" class="fixed top-0 left-0 w-full p-8 lg:p-12 4xl:p-16 6xl:p-32 pl-12 lg:pl-20 4xl:pl-28 6xl:pl-64 flex justify-between items-center z-50">
        <div class="flex items-center gap-12 4xl:gap-20 6xl:gap-48">
            <div class="text-[14px] lg:text-[18px] 4xl:text-[26px] 6xl:text-[60px] tracking-[0.25em] font-bold uppercase opacity-80">
                Intangible Store
            </div>
            <div class="flex items-center gap-2">
                <button onclick="resetStore()" class="flex items-center justify-center p-1 hover:opacity-50 active:scale-95 transition-all" title="위치 초기화">
                    <svg class="w-3.5 h-3.5 lg:w-4 lg:h-4 4xl:w-6 4xl:h-6 6xl:w-16 6xl:h-16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                </button>
            </div>

            <div class="flex items-center gap-4 lg:gap-6 4xl:gap-10 6xl:gap-24 text-[13px] lg:text-[16px] 4xl:text-[24px] 6xl:text-[48px] font-pixel font-bold pt-1">
                <div class="flex items-center gap-1.5 4xl:gap-2.5 6xl:gap-4" title="Spring"><span class="text-pink-300 text-sm 4xl:text-xl 6xl:text-5xl">♥</span><span id="count-spring">+0</span></div>
                <div class="flex items-center gap-1.5 4xl:gap-2.5 6xl:gap-4" title="Summer"><span class="text-emerald-300 text-sm 4xl:text-xl 6xl:text-5xl">♥</span><span id="count-summer">+0</span></div>
                <div class="flex items-center gap-1.5 4xl:gap-2.5 6xl:gap-4" title="Autumn"><span class="text-yellow-400 text-sm 4xl:text-xl 6xl:text-5xl">♥</span><span id="count-autumn">+0</span></div>
                <div class="flex items-center gap-1.5 4xl:gap-2.5 6xl:gap-4" title="Winter"><span class="text-sky-300 text-sm 4xl:text-xl 6xl:text-5xl">♥</span><span id="count-winter">+0</span></div>
            </div>
        </div>

        <nav class="flex items-center gap-6">
            <div class="flex bg-black/5 p-1 rounded-full backdrop-blur-sm">
                <button onclick="filterSeason('all', this)" class="filter-btn px-5 py-1.5 lg:px-8 lg:py-2.5 4xl:px-12 4xl:py-3.5 6xl:px-32 6xl:py-10 text-[12px] lg:text-[14px] 4xl:text-[20px] 6xl:text-[48px] uppercase font-bold tracking-widest bg-black text-white rounded-full shadow-lg transition-colors">All</button>
                <button onclick="filterSeason('spring', this)" class="filter-btn px-5 py-1.5 lg:px-8 lg:py-2.5 4xl:px-12 4xl:py-3.5 6xl:px-32 6xl:py-10 text-[12px] lg:text-[14px] 4xl:text-[20px] 6xl:text-[48px] uppercase font-bold tracking-widest text-gray-400 hover:text-black rounded-full transition-colors">Spring</button>
                <button onclick="filterSeason('summer', this)" class="filter-btn px-5 py-1.5 lg:px-8 lg:py-2.5 4xl:px-12 4xl:py-3.5 6xl:px-32 6xl:py-10 text-[12px] lg:text-[14px] 4xl:text-[20px] 6xl:text-[48px] uppercase font-bold tracking-widest text-gray-400 hover:text-black rounded-full transition-colors">Summer</button>
                <button onclick="filterSeason('autumn', this)" class="filter-btn px-5 py-1.5 lg:px-8 lg:py-2.5 4xl:px-12 4xl:py-3.5 6xl:px-32 6xl:py-10 text-[12px] lg:text-[14px] 4xl:text-[20px] 6xl:text-[48px] uppercase font-bold tracking-widest text-gray-400 hover:text-black rounded-full transition-colors">Autumn</button>
                <button onclick="filterSeason('winter', this)" class="filter-btn px-5 py-1.5 lg:px-8 lg:py-2.5 4xl:px-12 4xl:py-3.5 6xl:px-32 6xl:py-10 text-[12px] lg:text-[14px] 4xl:text-[20px] 6xl:text-[48px] uppercase font-bold tracking-widest text-gray-400 hover:text-black rounded-full transition-colors">Winter</button>
            </div>
        </nav>
    </header>

    <main id="storeView" class="relative min-h-screen flex flex-col justify-start pb-32 lg:pb-48">
        <div class="relative z-50 max-w-fit pl-12 lg:pl-20 4xl:pl-28 6xl:pl-64 pt-44 lg:pt-56 4xl:pt-64 6xl:pt-[22rem] pointer-events-none">
            <h1 class="font-pixel -ml-1 lg:-ml-2 4xl:-ml-3 6xl:-ml-6 text-[40px] lg:text-[70px] xl:text-[90px] 4xl:text-[130px] 6xl:text-[280px] leading-none tracking-[-0.05em] text-black/80 mb-2 lg:mb-4 4xl:mb-6 6xl:mb-16 select-none">
                memories
            </h1>
            <div class="flex items-center gap-3 4xl:gap-5 6xl:gap-12 ml-0 lg:-ml-1 4xl:-ml-1 6xl:-ml-2">
                <span class="text-[8px] lg:text-[15px] 4xl:text-[22px] 6xl:text-[48px] tracking-[0.4em] text-black/50 uppercase font-bold">
                    8 Sensations
                </span>
                <span class="font-pixel text-[8px] lg:text-[15px] 4xl:text-[22px] 6xl:text-[48px] tracking-widest text-black/50 font-bold">
                    - 카드를 눌러보세요!
                </span>
            </div>
        </div>

        <div class="relative z-40 w-full max-w-[1920px] 2xl:max-w-[2200px] 3xl:max-w-[2600px] 4xl:max-w-[3600px] 6xl:max-w-[5000px] mx-auto grid grid-cols-2 xl:grid-cols-4 place-items-center gap-x-6 xl:gap-x-12 2xl:gap-x-20 4xl:gap-x-24 6xl:gap-x-48 gap-y-12 xl:gap-y-24 4xl:gap-y-24 6xl:gap-y-32 px-4 sm:px-8 xl:px-16 4xl:px-24 6xl:px-48 mt-8 xl:mt-16 4xl:mt-12 6xl:mt-20">

            <!-- 1번째 카드 (봄 꽃): 아래로 내려서 타이틀과 안 겹치게 -->
            <div class="draggable-wrapper w-full max-w-[230px] sm:max-w-[280px] xl:max-w-[330px] 2xl:max-w-[400px] 3xl:max-w-[480px] 4xl:max-w-[680px] 6xl:max-w-[940px] relative cursor-grab active:cursor-grabbing z-10 transition-all duration-500" data-season="spring" style="left: 0; top: 0;">
                <div class="perspective relative w-full aspect-[461/880] translate-y-6 lg:translate-y-10 4xl:translate-y-16 6xl:translate-y-24 -rotate-3 hover:scale-105 transition-transform duration-300 group drop-shadow-md">
                    <div class="flip-card-inner transform-style-3d absolute inset-0 pointer-events-none">
                        <div class="backface-hidden absolute inset-0 receipt-zigzag bg-[#fdf2f3] p-3 4xl:p-5 6xl:p-8">
                            <div class="relative w-full h-full bg-white receipt-zigzag">
                                <img src="hi/ff.png" alt="Receipt Front" draggable="false" class="w-full h-full object-cover grayscale opacity-80 group-hover:grayscale-0 transition-all pointer-events-auto">
                                <div onclick="addMemory(event, '#fdf2f3', this, 'hi/ff.png', 'hi/ff1.jpeg')" class="absolute bottom-[2%] left-[5%] w-[25%] h-[12%] z-20 cursor-pointer pointer-events-auto"></div>
                                <div onclick='showReceipt(event, "Blooming Excitement", "spring", "a longing for spring")' class="absolute bottom-[2%] right-[5%] w-[60%] h-[12%] z-20 cursor-pointer pointer-events-auto"></div>
                            </div>
                        </div>
                        <div class="backface-hidden absolute inset-0 receipt-zigzag bg-[#fdf2f3] p-3 4xl:p-5 6xl:p-8 rotate-y-180">
                            <div class="relative w-full h-full bg-[#1d1d1d] receipt-zigzag distort-container overflow-hidden pointer-events-auto">
                                <img src="hi/fb.jpg" alt="Receipt Back Base" draggable="false" class="absolute inset-0 w-full h-full object-cover pointer-events-none">
                                <div class="absolute inset-0 w-full h-full pointer-events-none circle-mask">
                                    <div class="w-full h-full pointer-events-none lens-wrapper">
                                        <img src="hi/fb.jpg" alt="Receipt Back Lens" draggable="false" class="absolute inset-0 w-full h-full object-cover lens-image">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2번째 카드 (겨울 눈사람): 살짝 위로 올림 -->
            <div class="draggable-wrapper w-full max-w-[230px] sm:max-w-[280px] xl:max-w-[330px] 2xl:max-w-[400px] 3xl:max-w-[480px] 4xl:max-w-[680px] 6xl:max-w-[940px] relative cursor-grab active:cursor-grabbing z-10 transition-all duration-500" data-season="winter" style="left: 0; top: 0;">
                <div class="perspective relative w-full aspect-[461/880] -translate-y-4 lg:-translate-y-8 4xl:-translate-y-12 6xl:-translate-y-16 rotate-2 hover:scale-105 transition-transform duration-300 group drop-shadow-md">
                    <div class="flip-card-inner transform-style-3d absolute inset-0 pointer-events-none">
                        <div class="backface-hidden absolute inset-0 receipt-zigzag bg-[#d9ecfb] p-3 4xl:p-5 6xl:p-8">
                            <div class="relative w-full h-full bg-white receipt-zigzag">
                                <img src="hi/sf.png" alt="Receipt Front" draggable="false" class="w-full h-full object-cover grayscale opacity-80 group-hover:grayscale-0 transition-all pointer-events-auto">
                                <div onclick="addMemory(event, '#d9ecfb', this, 'hi/sf.png', 'hi/sf1.jpeg')" class="absolute bottom-[2%] left-[5%] w-[25%] h-[12%] z-20 cursor-pointer pointer-events-auto"></div>
                                <div onclick='showReceipt(event, "Snowman&#39;s Smile", "winter", "Red-tipped Nose")' class="absolute bottom-[2%] right-[5%] w-[60%] h-[12%] z-20 cursor-pointer pointer-events-auto"></div>
                            </div>
                        </div>
                        <div class="backface-hidden absolute inset-0 receipt-zigzag bg-[#d9ecfb] p-3 4xl:p-5 6xl:p-8 rotate-y-180">
                            <div class="relative w-full h-full bg-[#1d1d1d] receipt-zigzag distort-container overflow-hidden pointer-events-auto">
                                <img src="hi/sb.jpg" alt="Receipt Back Base" draggable="false" class="absolute inset-0 w-full h-full object-cover pointer-events-none">
                                <div class="absolute inset-0 w-full h-full pointer-events-none circle-mask">
                                    <div class="w-full h-full pointer-events-none lens-wrapper">
                                        <img src="hi/sb.jpg" alt="Receipt Back Lens" draggable="false" class="absolute inset-0 w-full h-full object-cover lens-image">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="draggable-wrapper w-full max-w-[230px] sm:max-w-[280px] xl:max-w-[330px] 2xl:max-w-[400px] 3xl:max-w-[480px] 4xl:max-w-[680px] 6xl:max-w-[940px] relative cursor-grab active:cursor-grabbing z-10 transition-all duration-500" data-season="summer" style="left: 0; top: 0;">
                <div class="perspective relative w-full aspect-[461/880] translate-y-4 lg:translate-y-8 4xl:translate-y-12 6xl:translate-y-20 rotate-1 hover:scale-105 transition-transform duration-300 group drop-shadow-md">
                    <div class="flip-card-inner transform-style-3d absolute inset-0 pointer-events-none">
                        <div class="backface-hidden absolute inset-0 receipt-zigzag bg-[#d8f0e0] p-3 4xl:p-5 6xl:p-8">
                            <div class="relative w-full h-full bg-white receipt-zigzag">
                                <img src="hi/wf.png" alt="Receipt Front" draggable="false" class="w-full h-full object-cover grayscale opacity-80 group-hover:grayscale-0 transition-all pointer-events-auto">
                                <div onclick="addMemory(event, '#d8f0e0', this, 'hi/wf.png', 'hi/wf1.jpeg')" class="absolute bottom-[2%] left-[5%] w-[25%] h-[12%] z-20 cursor-pointer pointer-events-auto"></div>
                                <div onclick='showReceipt(event, "A Slice of Summer", "summer", "a body softened in the sun")' class="absolute bottom-[2%] right-[5%] w-[60%] h-[12%] z-20 cursor-pointer pointer-events-auto"></div>
                            </div>
                        </div>
                        <div class="backface-hidden absolute inset-0 receipt-zigzag bg-[#d8f0e0] p-3 4xl:p-5 6xl:p-8 rotate-y-180">
                            <div class="relative w-full h-full bg-[#1d1d1d] receipt-zigzag distort-container overflow-hidden pointer-events-auto">
                                <img src="hi/wb.jpg" alt="Receipt Back Base" draggable="false" class="absolute inset-0 w-full h-full object-cover pointer-events-none">
                                <div class="absolute inset-0 w-full h-full pointer-events-none circle-mask">
                                    <div class="w-full h-full pointer-events-none lens-wrapper">
                                        <img src="hi/wb.jpg" alt="Receipt Back Lens" draggable="false" class="absolute inset-0 w-full h-full object-cover lens-image">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 4번째 카드 (가을 버스): 적당히 올림 -->
            <div class="draggable-wrapper w-full max-w-[230px] sm:max-w-[280px] xl:max-w-[330px] 2xl:max-w-[400px] 3xl:max-w-[480px] 4xl:max-w-[680px] 6xl:max-w-[940px] relative cursor-grab active:cursor-grabbing z-10 transition-all duration-500" data-season="autumn" style="left: 0; top: 0;">
                <div class="perspective relative w-full aspect-[461/880] -translate-y-8 lg:-translate-y-12 4xl:-translate-y-20 6xl:-translate-y-24 -rotate-2 hover:scale-105 transition-transform duration-300 group drop-shadow-md">
                    <div class="flip-card-inner transform-style-3d absolute inset-0 pointer-events-none">
                        <div class="backface-hidden absolute inset-0 receipt-zigzag bg-[#FFEFD5] p-3 4xl:p-5 6xl:p-8">
                            <div class="relative w-full h-full bg-white receipt-zigzag">
                                <img src="hi/bf.png" alt="Receipt Front" draggable="false" class="w-full h-full object-cover grayscale opacity-80 group-hover:grayscale-0 transition-all pointer-events-auto">
                                <div onclick="addMemory(event, '#FFEFD5', this, 'hi/bf.png', 'hi/bf1.jpeg')" class="absolute bottom-[2%] left-[5%] w-[25%] h-[12%] z-20 cursor-pointer pointer-events-auto"></div>
                                <div onclick='showReceipt(event, "Golden Trail", "autumn", "thoughts scattered in the wind")' class="absolute bottom-[2%] right-[5%] w-[60%] h-[12%] z-20 cursor-pointer pointer-events-auto"></div>
                            </div>
                        </div>
                        <div class="backface-hidden absolute inset-0 receipt-zigzag bg-[#FFEFD5] p-3 4xl:p-5 6xl:p-8 rotate-y-180">
                            <div class="relative w-full h-full bg-[#1d1d1d] receipt-zigzag distort-container overflow-hidden pointer-events-auto">
                                <img src="hi/bb.jpg" alt="Receipt Back Base" draggable="false" class="absolute inset-0 w-full h-full object-cover pointer-events-none">
                                <div class="absolute inset-0 w-full h-full pointer-events-none circle-mask">
                                    <div class="w-full h-full pointer-events-none lens-wrapper">
                                        <img src="hi/bb.jpg" alt="Receipt Back Lens" draggable="false" class="absolute inset-0 w-full h-full object-cover lens-image">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 5번째 카드 (겨울 트리): 살짝 아래로 내려서 1번과 겹치지 않게 -->
            <div class="draggable-wrapper w-full max-w-[230px] sm:max-w-[280px] xl:max-w-[330px] 2xl:max-w-[400px] 3xl:max-w-[480px] 4xl:max-w-[680px] 6xl:max-w-[940px] relative cursor-grab active:cursor-grabbing z-10 transition-all duration-500" data-season="winter" style="left: 0; top: 0;">
                <div class="perspective relative w-full aspect-[461/880] translate-y-2 lg:translate-y-4 4xl:translate-y-6 6xl:translate-y-10 rotate-3 hover:scale-105 transition-transform duration-300 group drop-shadow-md">
                    <div class="flip-card-inner transform-style-3d absolute inset-0 pointer-events-none">
                        <div class="backface-hidden absolute inset-0 receipt-zigzag bg-[#d9ecfb] p-3 4xl:p-5 6xl:p-8">
                            <div class="relative w-full h-full bg-white receipt-zigzag">
                                <img src="hi/cf.png" alt="Receipt Front" draggable="false" class="w-full h-full object-cover grayscale opacity-80 group-hover:grayscale-0 transition-all pointer-events-auto">
                                <div onclick="addMemory(event, '#d9ecfb', this, 'hi/cf.png', 'hi/cf1.jpeg')" class="absolute bottom-[2%] left-[5%] w-[25%] h-[12%] z-20 cursor-pointer pointer-events-auto"></div>
                                <div onclick='showReceipt(event, "The Eve of a Miracle", "winter", "a sincere wish")' class="absolute bottom-[2%] right-[5%] w-[60%] h-[12%] z-20 cursor-pointer pointer-events-auto"></div>

    <script>
        const memoryCounts = {
            spring: 0,
            summer: 0,
            autumn: 0,
            winter: 0
        };

        function resetStore() {
            const receipts = document.querySelectorAll('.draggable-wrapper');
            receipts.forEach(receipt => {
                receipt.style.left = '0px';
                receipt.style.top = '0px';
                const card = receipt.querySelector('.perspective');
                if (card && card.classList.contains('flipped')) {
                    card.classList.remove('flipped');
                }
                
                const frontImg = receipt.querySelector('img[alt="Receipt Front"]');
                if (frontImg && frontImg.hasAttribute('data-original-src')) {
                    const originalSrc = frontImg.getAttribute('data-original-src');
                    if (frontImg.getAttribute('src') !== originalSrc) {
                        frontImg.setAttribute('src', originalSrc);
                    }
                }
            });
            
            const allBtn = document.querySelector('.filter-btn');
            if (allBtn) filterSeason('all', allBtn);
        }

        function filterSeason(season, btnElement) {
            const allBtns = document.querySelectorAll('.filter-btn');
            allBtns.forEach(btn => {
                btn.classList.remove('bg-black', 'text-white', 'text-black', 'shadow-lg');
                btn.style.backgroundColor = '';
                btn.classList.add('text-gray-400', 'hover:text-black');
            });
            
            btnElement.classList.remove('text-gray-400', 'hover:text-black');
            btnElement.classList.add('shadow-lg');

            if (season === 'all') {
                btnElement.classList.add('bg-black', 'text-white');
            } else {
                btnElement.classList.add('text-white');
                const themeColors = {
                    'spring': '#f9a8d4', // 하트의 pink-300 색상
                    'summer': '#6ee7b7', // 하트의 emerald-300 색상
                    'autumn': '#facc15', // 하트의 yellow-400 색상
                    'winter': '#7dd3fc'  // 하트의 sky-300 색상
                };
                btnElement.style.backgroundColor = themeColors[season];
            }

            const receipts = document.querySelectorAll('.draggable-wrapper');
            receipts.forEach(receipt => {
                if (season === 'all' || receipt.dataset.season === season) {
                    receipt.classList.remove('blur-sm', 'opacity-50', 'pointer-events-none');
                } else {
                    receipt.classList.add('blur-sm', 'opacity-50', 'pointer-events-none');
                } 
            });
        }

        function addMemory(event, bgColor, btn, originalSrc, filledSrc) {
            event.stopPropagation();
            
            const container = btn.parentElement;
            const img = container.querySelector('img');
            let toastText = '';
            let isSpecialMilestone = false; // 에러 원인 해결!

            const wrapper = btn.closest('.draggable-wrapper');
            const season = wrapper ? wrapper.dataset.season : null;
            
            if (img.getAttribute('src') === originalSrc) {
                img.setAttribute('src', filledSrc);
                toastText = '기억 목록에 추가!';
                if (season) {
                    memoryCounts[season]++;
                    if (memoryCounts[season] % 10 === 0) {
                        isSpecialMilestone = true;
                        toastText = `🎉 ${memoryCounts[season]}번째 기억 달성! 🎉`;
                    }
                    document.getElementById(`count-${season}`).innerText = `+${memoryCounts[season]}`; // 화면 즉시 업데이트
                }
                
                // --- 💖 하트 날아가는 애니메이션 (파티클 효과) ---
                const heartColors = {
                    'spring': '#f9a8d4', // pink-300
                    'summer': '#6ee7b7', // emerald-300
                    'autumn': '#facc15', // yellow-400
                    'winter': '#7dd3fc'
                };
                const hColor = season ? heartColors[season] : '#ffb3ba';
                const scaleFactor = window.innerWidth >= 5000 ? 4 : (window.innerWidth >= 2400 ? 2.5 : (window.innerWidth >= 1024 ? 1.5 : 1));
                const numHearts = 8 + Math.floor(Math.random() * 6);
                
                let clientX = event.clientX;
                let clientY = event.clientY;
                if (event.type.includes('touch') && event.touches && event.touches.length > 0) {
                    clientX = event.touches[0].clientX;
                    clientY = event.touches[0].clientY;
                }

                // --- 🎉 10번 단위 기념: 파스텔 꽃가루(Confetti) 폭발 효과 ---
                if (isSpecialMilestone) {
                    const confettiColors = ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', '#e8baff']; // 파스텔 무지개 6색
                    const numConfetti = 60 + Math.floor(Math.random() * 40); // 60~100개
                    for (let i = 0; i < numConfetti; i++) {
                        const confetti = document.createElement('div');
                        confetti.className = 'fixed pointer-events-none z-[9998] shadow-sm';
                        const size = (8 + Math.random() * 12) * scaleFactor;
                        confetti.style.width = `${size}px`;
                        confetti.style.height = `${size * (Math.random() > 0.5 ? 1 : 1.5)}px`; // 정사각형, 직사각형 섞기
                        if (Math.random() > 0.5) confetti.style.borderRadius = '50%'; // 절반은 동그라미
                        confetti.style.backgroundColor = confettiColors[Math.floor(Math.random() * confettiColors.length)];
                        confetti.style.left = `${clientX}px`;
                        confetti.style.top = `${clientY}px`;
                        
                        const angle = Math.random() * Math.PI * 2;
                        const distance = (150 + Math.random() * 450) * scaleFactor;
                        const tx = Math.cos(angle) * distance;
                        const ty = Math.sin(angle) * distance - (200 * scaleFactor); // 살짝 위로 솟구치도록
                        const rot = (Math.random() - 0.5) * 1000;
                        const duration = 1.5 + Math.random() * 1.5;
                        
                        confetti.style.transition = `transform ${duration}s cubic-bezier(0.25, 1, 0.5, 1), opacity ${duration}s ease-in`;
                        confetti.style.transform = `translate(-50%, -50%) rotate(0deg)`;
                        confetti.style.opacity = '1';
                        
                        document.body.appendChild(confetti);
                        
                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => {
                                confetti.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) rotate(${rot}deg)`;
                                confetti.style.opacity = '0';
                            });
                        });
                        
                        setTimeout(() => {
                            if (document.body.contains(confetti)) confetti.remove();
                        }, duration * 1000);
                    }
                }

                for (let i = 0; i < numHearts; i++) {
                    const heart = document.createElement('div');
                    heart.innerHTML = '♥';
                    heart.className = 'fixed pointer-events-none z-[9999] font-pixel drop-shadow-md';
                    heart.style.left = `${clientX}px`;
                    heart.style.top = `${clientY}px`;
                    heart.style.color = hColor;
                    
                    const size = (20 + Math.random() * 30) * scaleFactor;
                    heart.style.fontSize = `${size}px`;
                    
                    const tx = (Math.random() - 0.5) * 300 * scaleFactor;
                    const ty = (-150 - Math.random() * 250) * scaleFactor;
                    const rot = (Math.random() - 0.5) * 90;
                    const duration = 0.8 + Math.random() * 0.6;
                    
                    heart.style.transition = `transform ${duration}s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity ${duration}s ease-out`;
                    heart.style.transform = `translate(-50%, -50%) scale(0.5) rotate(0deg)`;
                    heart.style.opacity = '1';
                    
                    document.body.appendChild(heart);
                    
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            heart.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(${1 + Math.random() * 0.5}) rotate(${rot}deg)`;
                            heart.style.opacity = '0';
                        });
                    });
                    
                    // 애니메이션 끝난 후 요소 삭제 (메모리 누수 방지)
                    setTimeout(() => {
                        if (document.body.contains(heart)) {
                            heart.remove();
                        }
                    }, duration * 1000);
                }
            } else {
                img.setAttribute('src', originalSrc);

                // --- 💔 하트 모이는 애니메이션 (리버스 파티클 효과) ---
                // --- 💔 하트 모이는 애니메이션 ---
                const heartColors = {
                    'spring': '#f9a8d4', // pink-300
                    'summer': '#6ee7b7', // emerald-300
                    'autumn': '#facc15', // yellow-400
                    'winter': '#7dd3fc'
                };
                const hColor = season ? heartColors[season] : '#ffb3ba';
                const scaleFactor = window.innerWidth >= 5000 ? 4 : (window.innerWidth >= 2400 ? 2.5 : (window.innerWidth >= 1024 ? 1.5 : 1));
                const numHearts = 8 + Math.floor(Math.random() * 5);
                
                let clientX = event.clientX;
                let clientY = event.clientY;
                if (event.type.includes('touch') && event.touches && event.touches.length > 0) {
                    clientX = event.touches[0].clientX;
                    clientY = event.touches[0].clientY;
                }

                for (let i = 0; i < numHearts; i++) {
                    const heart = document.createElement('div');
                    heart.innerHTML = '♥';
                    heart.className = 'fixed pointer-events-none z-[9999] font-pixel drop-shadow-md';
                    heart.style.left = `${clientX}px`;
                    heart.style.top = `${clientY}px`;
                    heart.style.color = hColor;
                    
                    const size = (15 + Math.random() * 25) * scaleFactor;
                    heart.style.fontSize = `${size}px`;
                    
                    const tx = (Math.random() - 0.5) * 350 * scaleFactor;
                    const ty = (-100 - Math.random() * 300) * scaleFactor;
                    const rot = (Math.random() - 0.5) * 180;
                    const duration = 0.4 + Math.random() * 0.4;
                    
                    // 1. 시작 상태: 바깥에 위치, 투명도 0
                    heart.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(1) rotate(${rot}deg)`;
                    heart.style.opacity = '0';
                    
                    document.body.appendChild(heart);
                    
                    // 2. 브라우저가 애니메이션 시작을 확실히 인식하도록 강제 계산(Reflow)
                    void heart.offsetWidth;
                    
                    // 3. 도착 상태: 클릭한 손가락 위치(중앙)로 모이면서 스케일 0
                    heart.style.transition = `transform ${duration}s cubic-bezier(0.55, 0.085, 0.68, 0.53), opacity ${duration}s ease-in`;
                    heart.style.transform = `translate(-50%, -50%) scale(0) rotate(0deg)`;
                    heart.style.opacity = '1';
                    
                    // 4. 애니메이션 종료 후 DOM 제거
                    setTimeout(() => {
                        if (document.body.contains(heart)) {
                            heart.remove();
                        }
                    }, duration * 1000);
                }
            }

            if (toastText !== '') {
                // --- 토스트 메시지 관련 로직 ---
                const existingToast = document.querySelector('.memory-toast');
                if (existingToast) existingToast.remove();
                
                const toast = document.createElement('div');
                
                if (isSpecialMilestone) {
                    // 특별한 달성 시: 파스텔톤 무지개빛 그라데이션 배경
                    toast.className = 'memory-toast fixed top-1/2 left-1/2 w-[380px] md:w-[500px] 4xl:w-[850px] 6xl:w-[1400px] receipt-zigzag-large font-pixel text-black text-[22px] md:text-[30px] 4xl:text-[46px] 6xl:text-[72px] font-bold text-center py-12 md:py-16 4xl:py-28 6xl:py-40 shadow-[0_0_60px_rgba(255,180,200,0.4)] transform -translate-x-1/2 -translate-y-1/2 scale-95 opacity-0 transition-all duration-500 z-[100] pointer-events-none';
                    toast.style.background = 'linear-gradient(135deg, #ffb3ba, #ffdfba, #ffffba, #baffc9, #bae1ff, #e8baff)';
                } else {
                    // 평소: 기본 단색 배경
                    toast.className = 'memory-toast fixed top-1/2 left-1/2 w-[360px] md:w-[480px] 4xl:w-[750px] 6xl:w-[1200px] receipt-zigzag-large font-pixel text-black text-[24px] md:text-[32px] 4xl:text-[50px] 6xl:text-[76px] font-bold text-center py-10 md:py-12 4xl:py-20 6xl:py-32 shadow-2xl transform -translate-x-1/2 -translate-y-1/2 scale-95 opacity-0 transition-all duration-300 z-[100] pointer-events-none';
                    toast.style.backgroundColor = bgColor;
                }
                toast.innerText = toastText;
                
                document.body.appendChild(toast);
                
                requestAnimationFrame(() => {
                    toast.classList.remove('scale-95', 'opacity-0');
                    toast.classList.add('scale-100');
                });
                
                setTimeout(() => {
                    toast.classList.add('scale-95', 'opacity-0');
                    toast.classList.remove('scale-100');
                    setTimeout(() => {
                        if (document.body.contains(toast)) {
                            toast.remove();
                        }
                    }, 300);
                }, 2000);
            }
        }

        function showReceipt(event, title, theme, price) {
            event.stopPropagation();
            
            document.getElementById('receiptTitle').innerText = title;
            document.getElementById('receiptThemeVal').innerText = theme;
            document.getElementById('receiptPriceVal').innerText = price;

            const modal = document.getElementById('receiptModal');
            const content = document.getElementById('receiptContent');
            
            // 계절별 테마 색상 지정
            const themeColors = {
                'spring': '#fdf2f3',
                'summer': '#d8f0e0',
                'autumn': '#FFEFD5',
                'winter': '#d9ecfb'
            };
            content.style.setProperty('background-color', themeColors[theme] || '#fcfaf2', 'important');

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            });
        }

        function closeReceipt() {
            const modal = document.getElementById('receiptModal');
            const content = document.getElementById('receiptContent');
            
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const wrappers = document.querySelectorAll('.draggable-wrapper');
            let highestZIndex = 20;

            const distortContainers = document.querySelectorAll('.distort-container');
            distortContainers.forEach(container => {
                const moveDistortion = (e) => {
                    let clientX, clientY;
                    if (e.type === 'touchmove') {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }
                    const rect = container.getBoundingClientRect();
                    const x = ((clientX - rect.left) / rect.width) * 100;
                    const y = ((clientY - rect.top) / rect.height) * 100;
                    
                    container.style.setProperty('--mouse-x', `${x}%`);
                    container.style.setProperty('--mouse-y', `${y}%`);
                };
                container.addEventListener('mousemove', moveDistortion);
                container.addEventListener('touchmove', moveDistortion, { passive: true });
            });

            wrappers.forEach(wrapper => {
                const frontImg = wrapper.querySelector('img[alt="Receipt Front"]');
                if (frontImg && !frontImg.hasAttribute('data-original-src')) {
                    frontImg.setAttribute('data-original-src', frontImg.getAttribute('src'));
                }

                let isDragging = false;
                let startX, startY, initialLeft, initialTop;
                let moved = false;

                wrapper.addEventListener('mousedown', dragStart);
                wrapper.addEventListener('touchstart', dragStart, { passive: false });

                function dragStart(e) {
                    if (e.type === 'mousedown') {
                        startX = e.clientX;
                        startY = e.clientY;
                    } else {
                        startX = e.touches[0].clientX;
                        startY = e.touches[0].clientY;
                    }

                    const style = window.getComputedStyle(wrapper);
                    initialLeft = parseInt(style.left, 10) || 0;
                    initialTop = parseInt(style.top, 10) || 0;
                    
                    isDragging = true;
                    moved = false;

                    highestZIndex++;
                    wrapper.style.zIndex = highestZIndex;

                    document.addEventListener('mousemove', drag);
                    document.addEventListener('mouseup', dragEnd);
                    document.addEventListener('touchmove', drag, { passive: false });
                    document.addEventListener('touchend', dragEnd);
                }

                function drag(e) {
                    if (!isDragging) return;
                    
                    let currentX, currentY;
                    if (e.type === 'mousemove') {
                        currentX = e.clientX;
                        currentY = e.clientY;
                    } else {
                        currentX = e.touches[0].clientX;
                        currentY = e.touches[0].clientY;
                    }

                    const dx = currentX - startX;
                    const dy = currentY - startY;

                    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                        moved = true;
                    }

                    if (moved) {
                        e.preventDefault();
                        wrapper.style.left = (initialLeft + dx) + 'px';
                        wrapper.style.top = (initialTop + dy) + 'px';
                    }
                }

                function dragEnd(e) {
                    isDragging = false;
                    document.removeEventListener('mousemove', drag);
                    document.removeEventListener('mouseup', dragEnd);
                    document.removeEventListener('touchmove', drag);
                    document.removeEventListener('touchend', dragEnd);
                }

                wrapper.addEventListener('click', function(e) {
                    if (!moved) {
                        const card = wrapper.querySelector('.perspective');
                        if(card) {
                            card.classList.toggle('flipped');
                        }
                    }
                });
            });
        });
    </script>
</body>
